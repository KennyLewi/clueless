<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EarlyBirds</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --text:#1A1714; --mono-body:#3F3A35; --muted:#6B6560; --faint:#8A847D; --faint2:#97918A; --placeholder:#B7B2AB;
  --card:#FFFFFF; --panel:#FBFAF8; --bg:#F6F4F1;
  --border:#E9E5DF; --border-lt:#F0ECE6; --border-lt2:#ECE8E2; --input:#E2DED7;
  --teal:#1D9E75; --teal-fill:#0F6E56; --teal-tint:#E6F4EE; --teal-tint2:#EAF4EF; --teal-tint3:#EDF5F1; --teal-tint-text:#3A6B59; --teal-border:#CDE6DB;
  --amber-bg:#FBEEDB; --amber-logo:#C97B14; --amber-head:#7A4A06; --amber-sub:#9A6A1E; --amber-text:#B5740E; --amber-dot:#D9920F; --amber-panel:#FCF6EB; --amber-panel-border:#EFD9B4;
  --red-dot:#C2503E; --red-text:#9A3B2E; --red-bg:#F7E9E6;
  --font:'Hanken Grotesk', system-ui, sans-serif; --mono:'IBM Plex Mono', monospace;
}
* { box-sizing: border-box; }
html, body { margin: 0; height: 100%; }
body { font-family: var(--font); background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; font-size: 14px; min-width: 720px; }
.mono { font-family: var(--mono); }
button { font-family: inherit; }
input, textarea { font-family: inherit; }
*::-webkit-scrollbar { width: 10px; height: 10px; }
*::-webkit-scrollbar-thumb { background: #E0DBD3; border-radius: 8px; border: 3px solid transparent; background-clip: content-box; }
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
@keyframes fadeup { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

/* Buttons */
.btn { display:inline-flex; align-items:center; justify-content:center; gap:7px; border-radius:11px; font-size:14px; font-weight:600; cursor:pointer; border:none; }
.btn-primary { background:var(--teal-fill); color:#fff; padding:12px 24px; }
.btn-outline { background:transparent; color:var(--teal-fill); border:1px solid var(--teal); padding:8px 18px; }
.btn-ghost { background:none; border:none; color:var(--faint); font-weight:500; font-size:14px; cursor:pointer; }
.btn-neutral { background:none; border:1px solid var(--input); color:var(--muted); font-weight:500; padding:7px 16px; border-radius:9px; }
.btn-sm { padding:7px 14px; font-size:12.5px; border-radius:9px; }
.btn:disabled { background:#ECE9E4; color:#A8A39B; cursor:not-allowed; }

/* Cards / inputs */
.card { background:var(--card); border:1px solid var(--border); border-radius:16px; }
.input { width:100%; border:1px solid var(--input); border-radius:11px; padding:12px 13px; font-size:14px; background:var(--panel); color:var(--text); }
.input:focus, textarea:focus { outline:none; border-color:var(--teal); }
.input-dashed { border:1px dashed #DDD8D1; background:#FCFBF9; }
.eyebrow { font-family:var(--mono); font-size:12px; color:var(--faint); }
.section-label { font-size:12.5px; color:var(--faint); font-weight:600; letter-spacing:0.02em; }
.page-title { font-weight:700; font-size:26px; letter-spacing:-0.02em; margin:0; }
.page-sub { font-size:14.5px; color:var(--muted); margin-top:5px; }

/* Pills + chips */
.pill-exa { display:inline-flex; align-items:center; gap:5px; background:var(--teal-tint); color:var(--teal-fill); font-family:var(--mono); font-size:11px; padding:3px 9px; border-radius:999px; }
.pill-exa .dot { width:5px; height:5px; border-radius:50%; background:var(--teal); }
.pill-merged { background:#F2EFEA; color:var(--muted); font-family:var(--mono); font-size:11px; padding:3px 9px; border-radius:999px; }
.reason-pill { background:var(--teal-tint3); color:var(--teal-tint-text); font-size:13px; padding:5px 12px; border-radius:8px; }
.chip-src { display:inline-flex; align-items:center; margin-top:7px; background:var(--teal-tint3); color:var(--teal-tint-text); font-family:var(--mono); font-size:10.5px; padding:2px 8px; border-radius:999px; }
.chip-inferred { display:inline-flex; align-items:center; gap:5px; margin-top:7px; color:var(--amber-text); font-size:11px; font-weight:600; }
.chip-inferred .dot, .chip-draft .dot { width:5px; height:5px; border-radius:50%; background:var(--amber-dot); }
.chip-draft { display:inline-flex; align-items:center; gap:5px; color:var(--amber-text); font-size:11px; font-weight:600; }
.filter-chip { padding:7px 14px; border-radius:999px; border:1px solid var(--input); background:#fff; color:var(--muted); font-size:13px; font-weight:500; cursor:pointer; }
.filter-chip.active { border:1px solid var(--teal-fill); background:var(--teal-tint2); color:var(--teal-fill); font-weight:600; }
.interest-chip { padding:9px 15px; border-radius:999px; border:1px solid var(--input); background:#fff; color:var(--muted); font-size:14px; font-weight:500; cursor:pointer; }
.interest-chip.active { border:1px solid var(--teal-fill); background:var(--teal-tint2); color:var(--teal-fill); font-weight:600; }

/* Sidebar */
.shell { display:flex; height:100vh; background:var(--bg); }
.sidebar { width:250px; flex-shrink:0; background:#fff; border-right:1px solid var(--border-lt2); display:flex; flex-direction:column; padding:20px 16px; }
.brand { display:flex; align-items:center; gap:10px; padding:6px 8px 22px; font-weight:700; font-size:18px; letter-spacing:-0.01em; }
.nav { display:flex; flex-direction:column; gap:3px; }
.nav-item { display:flex; align-items:center; gap:12px; padding:9px 13px; border-radius:10px; font-size:14px; font-weight:500; color:var(--muted); background:transparent; border:none; width:100%; text-align:left; cursor:pointer; }
.nav-item:hover { background:var(--panel); }
.nav-item.active { font-weight:600; color:var(--teal-fill); background:var(--teal-tint2); }
.user-chip { margin-top:auto; border-top:1px solid var(--border-lt); padding-top:14px; display:flex; align-items:center; gap:11px; }
.avatar { width:36px; height:36px; border-radius:50%; background:var(--teal-fill); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:600; font-size:14px; }
.main { flex:1; overflow:auto; }
.wrap { max-width:920px; margin:0 auto; padding:34px 40px 60px; }
.wrap-event { max-width:760px; }
.wrap-narrow { max-width:720px; }

/* Full-page (auth/onboarding) */
.page { height:100vh; background:var(--bg); display:flex; align-items:center; justify-content:center; padding:24px; overflow:auto; }
.label { font-size:12.5px; color:var(--muted); font-weight:500; display:block; margin-bottom:7px; }

/* Form mirror fields */
.field-box { border:1px solid var(--border); border-radius:10px; padding:10px 12px; background:var(--panel); display:flex; align-items:center; justify-content:space-between; gap:8px; min-height:21px; }
.field-box .val { font-family:var(--mono); font-size:12.5px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.field-box.active { border:1.5px solid var(--teal); background:#F1FAF5; justify-content:flex-start; gap:2px; padding:9px 12px; }
.field-box.pending { border:1px dashed #DDD8D1; background:#FCFBF9; display:block; }
.field-box.pending-wide { min-height:42px; padding:12px; }
.caret { display:inline-block; width:2px; height:15px; background:var(--teal-fill); margin-left:1px; animation:blink 1s step-end infinite; }
.callout { border:1px solid var(--amber-panel-border); background:var(--amber-panel); border-radius:12px; padding:16px 18px; margin-bottom:18px; }
.callout-eyebrow { display:inline-flex; align-items:center; gap:6px; color:var(--amber-text); font-size:11px; font-weight:700; font-family:var(--mono); letter-spacing:0.03em; }
.callout-eyebrow .dot { width:6px; height:6px; border-radius:50%; background:var(--amber-dot); }

/* Settings toggle */
.toggle-track { width:42px; height:24px; border-radius:999px; border:none; cursor:pointer; position:relative; flex-shrink:0; transition:background .15s; }
.toggle-knob { position:absolute; top:3px; left:3px; width:18px; height:18px; border-radius:50%; background:#fff; transition:transform .15s; }

/* Demo state picker */
.demo-bar { position:absolute; bottom:14px; left:50%; transform:translateX(-50%); display:flex; align-items:center; gap:7px; background:rgba(255,255,255,0.96); border:1px solid var(--input); border-radius:999px; padding:6px 9px; box-shadow:0 4px 16px rgba(0,0,0,.08); }
.demo-bar .lbl { font-family:var(--mono); font-size:10px; color:#A39E97; letter-spacing:0.04em; padding:0 4px; }
.demo-chip { padding:5px 11px; border-radius:999px; border:none; background:#F2EFEA; color:var(--muted); font-size:11.5px; font-weight:500; cursor:pointer; }
.demo-chip.active { background:var(--teal-fill); color:#fff; font-weight:600; }
</style>
</head>
<body>
<div id="app"></div>
<script>
/* ============================== MOCK DATA ============================== */
const DRAFT_HW = "Drawn to the hardware track — I've been shipping fast, user-facing side projects and want a weekend to build something end-to-end with a team.";
const DRAFT_FIN = "I'm excited to explore payments infrastructure and fraud detection — areas I haven't built in yet. My experience shipping polished, user-facing products means I can contribute from day one.";

const EVENTS = [
  { id:'fintech', title:'Fintech Forward', place:'Singapore', dates:'May 9–11, 2026', deadline:'2d 03h', short:'closes in 2d 03h', reason:'Outside your usual lane — fintech, 2 days.', viaExa:true, merged:false, remote:false, closingSoon:true, stretch:true,
    reasons:['Outside your usual lane','Beginner-friendly track','Team size 1–4','Travel grant available'],
    query:'fintech forward hackathon 2026 registration deadline',
    sources:[{label:'Deadline',url:'fintechforward.io/apply',conf:'95%'},{label:'Eligibility',url:'fintechforward.io/faq',conf:'90%'}], draft:DRAFT_FIN },
  { id:'treehacks', title:'TreeHacks 2026', place:'Stanford, CA', dates:'Feb 13–15, 2026', deadline:'2d 14h 32m', short:'closes in 2d 14h 32m', reason:'Matches your ML + hardware interests.', viaExa:true, merged:false, remote:false, closingSoon:true,
    reasons:['ML + hardware','Travel under 1 hour','Team size 1–4','Hardware track'],
    query:'treehacks 2026 application deadline site:treehacks.com',
    sources:[{label:'Deadline',url:'treehacks.com/apply',conf:'98%'},{label:'Location',url:'devpost.com/treehacks-2026',conf:'94%'},{label:'Eligibility',url:'treehacks.com/faq',conf:'89%'}], draft:DRAFT_HW },
  { id:'ethbangkok', title:'ETHGlobal Bangkok', place:'Bangkok, TH', dates:'Mar 6–8, 2026', deadline:'12d 06h', short:'closes in 12d 06h', reason:'You starred two Solidity repos last month.', viaExa:false, merged:true, remote:false, closingSoon:false,
    reasons:['Solidity experience','Crypto track','Travel grant available'],
    query:'ethglobal bangkok 2026 registration deadline',
    sources:[{label:'Deadline',url:'ethglobal.com/events/bangkok',conf:'96%'},{label:'Travel',url:'ethglobal.com/faq',conf:'91%'}], draft:DRAFT_HW },
  { id:'calhacks', title:'Cal Hacks 12.0', place:'UC Berkeley', dates:'Apr 3–5, 2026', deadline:'5d 18h', short:'closes in 5d 18h', reason:"Travel-free — you're 20 minutes away.", viaExa:false, merged:false, remote:false, closingSoon:true,
    reasons:['Local — no travel','Beginner-friendly','Team size 1–4'],
    query:'cal hacks 12.0 registration deadline',
    sources:[{label:'Deadline',url:'calhacks.io',conf:'97%'}], draft:DRAFT_HW },
  { id:'pioneer', title:'Pioneer Summer Build', place:'Remote', dates:'Jun 1 – Aug 1', deadline:'20d', short:'closes in 20d', reason:'Solo-friendly with async judging.', viaExa:true, merged:false, remote:true, closingSoon:false,
    reasons:['Remote','Solo-friendly','Async judging'],
    query:'pioneer summer build application deadline',
    sources:[{label:'Format',url:'pioneer.app',conf:'92%'}], draft:DRAFT_HW },
];

const REGS_RAW = [
  { id:'treehacks', title:'TreeHacks 2026', place:'Stanford, CA', deadline:'2d 14h', status:'awaiting' },
  { id:'fintech', title:'Fintech Forward', place:'Singapore', deadline:'2d 03h', status:'paused' },
  { id:'mlh', title:'MLH Spring Kickoff', place:'Remote', deadline:'submitted', status:'registered' },
  { id:'ethbangkok', title:'ETHGlobal Bangkok', place:'Bangkok, TH', deadline:'12d 06h', status:'needsinput' },
  { id:'calhacks', title:'Cal Hacks 12.0', place:'UC Berkeley', deadline:'5d 18h', status:'filling' },
  { id:'pennapps', title:'PennApps XXVI', place:'Philadelphia, PA', deadline:'1d 03h', status:'failed' },
];

const REG_META = {
  registered:{ label:'Registered', color:'#0F6E56', bg:'#E6F4EE', dot:'#1D9E75' },
  awaiting:{ label:'Awaiting approval', color:'#B5740E', bg:'#FBEEDB', dot:'#D9920F' },
  needsinput:{ label:'Needs your input', color:'#B5740E', bg:'#FBEEDB', dot:'#D9920F' },
  filling:{ label:'Auto-filling…', color:'#0F6E56', bg:'#EAF4EF', dot:'#0F6E56' },
  paused:{ label:'Paused — action needed', color:'#B5740E', bg:'#FBEEDB', dot:'#D9920F' },
  failed:{ label:'Failed', color:'#9A3B2E', bg:'#F7E9E6', dot:'#C2503E' },
};

const NOTIF_COLOR = { needs:'#D9920F', awaiting:'#D9920F', success:'#1D9E75', deadline:'#97918A', found:'#1D9E75' };
const NOTIFS = [
  { time:'2m ago', type:'needs', text:'ETHGlobal Bangkok needs your input — team status.' },
  { time:'1h ago', type:'success', text:"You're registered for MLH Spring Kickoff." },
  { time:'3h ago', type:'awaiting', text:'TreeHacks 2026 is filled and ready for your approval.' },
  { time:'1d ago', type:'deadline', text:'Cal Hacks 12.0 closes in 5 days.' },
  { time:'2d ago', type:'found', text:'3 new events matched your profile.' },
];

const SETTING_DEFS = [
  { key:'requireApproval', label:'Require my approval before submitting', desc:'The agent fills forms but never submits until you confirm.' },
  { key:'inferAnswers', label:'Let the agent draft open-ended answers', desc:'Drafts answers like "Why do you want to join?" for your review.' },
  { key:'notifyClosing', label:'Notify me before deadlines', desc:'Heads-up 48 hours before a matched event closes.' },
  { key:'batch', label:'Batch auto-register', desc:'Queue several matched events and register in one run.' },
];
const CONN_DEFS = [
  { key:'github', name:'GitHub', detail:'github.com/mayac' },
  { key:'google', name:'Google', detail:'Calendar + email sync' },
  { key:'resume', name:'Résumé', detail:'maya-chen-resume.pdf' },
];
const INTERESTS = ['AI','Climate','Fintech','DevTools','Health','Hardware','Crypto','Education','Something new to me'];
const AF_STEPS = [['filling','Filling'],['needsinput','Needs input'],['captcha','CAPTCHA'],['oauth','OAuth'],['awaiting','Awaiting'],['submitting','Submitting'],['success','Success'],['failed','Failed']];

/* ============================== STATE ============================== */
const state = {
  route: 'auth',
  afStep: 'filling',
  selected: null,            // event id
  feedFilter: 'all',
  regFilter: 'all',
  interests: ['Fintech','AI','DevTools'],
  draftText: null,
  saved: { treehacks:true, ethbangkok:false, calhacks:false, pioneer:true, fintech:false },
  settings: { requireApproval:true, inferAnswers:true, notifyClosing:true, batch:false },
  connected: { github:true, google:false, resume:true },
};
let timers = [];
const evById = (id) => EVENTS.find(e => e.id === id) || EVENTS[0];
const currentSel = () => state.selected ? evById(state.selected) : EVENTS[0];

/* ============================== ACTIONS ============================== */
const App = {
  clearTimers() { timers.forEach(t => clearTimeout(t)); timers = []; },
  set(patch) { Object.assign(state, patch); render(); },
  go(route) { this.clearTimers(); this.set({ route }); },
  openEvent(id) { this.clearTimers(); this.set({ selected:id, route:'event' }); },
  startAutofill(id) {
    this.clearTimers();
    this.set({ selected:id, route:'autofill', afStep:'filling', draftText:null });
    timers.push(setTimeout(() => this.set({ afStep:'needsinput' }), 2600));
  },
  openAutofillAt(id, step) { this.clearTimers(); this.set({ selected:id, route:'autofill', afStep:step, draftText:null }); },
  setAfStep(step) { this.clearTimers(); this.set({ afStep:step }); },
  resume() { this.clearTimers(); this.set({ afStep:'awaiting' }); },
  submitNeedsInput() { this.clearTimers(); this.set({ afStep:'awaiting' }); },
  confirmSubmit() { this.clearTimers(); this.set({ afStep:'submitting' }); timers.push(setTimeout(() => this.set({ afStep:'success' }), 1800)); },
  retry() { this.clearTimers(); this.set({ afStep:'submitting' }); timers.push(setTimeout(() => this.set({ afStep:'success' }), 1600)); },
  toggleSave(id) { state.saved = { ...state.saved, [id]: !state.saved[id] }; render(); },
  toggleSetting(k) { state.settings = { ...state.settings, [k]: !state.settings[k] }; render(); },
  toggleConnected(k) { state.connected = { ...state.connected, [k]: !state.connected[k] }; render(); },
  setFeedFilter(f) { this.set({ feedFilter:f }); },
  setRegFilter(f) { this.set({ regFilter:f }); },
  toggleInterest(t) { state.interests = state.interests.includes(t) ? state.interests.filter(x=>x!==t) : [...state.interests, t]; render(); },
  regenerate() { this.set({ draftText: currentSel().draft || DRAFT_FIN }); },
  shorten() { const d = (currentSel().draft || DRAFT_FIN); this.set({ draftText: d.split('.')[0] + '.' }); },
};
window.App = App;

/* ============================== ICONS ============================== */
function bird(size, color) {
  return `<svg width="${size}" height="${size}" viewBox="0 0 28 28" fill="none"><path d="M4 18 L14 6 L14 11 L24 18" stroke="${color||'#0F6E56'}" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"></path></svg>`;
}
const ICONS = {
  discover:'<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h10"></path></svg>',
  saved:'<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linejoin="round"><path d="M6 4h12v16l-6-4-6 4z"></path></svg>',
  regs:'<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="4" width="16" height="16" rx="3"></rect><path d="M8.5 12l2.5 2.5 4.5-5"></path></svg>',
  notif:'<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9a6 6 0 0 1 12 0c0 5 2 6 2 6H4s2-1 2-6z"></path><path d="M10 20a2 2 0 0 0 4 0"></path></svg>',
  profile:'<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><circle cx="12" cy="8" r="3.4"></circle><path d="M5 20c0-3.6 3.1-6 7-6s7 2.4 7 6"></path></svg>',
  settings:'<svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round"><path d="M4 7h10M18 7h2M4 17h2M10 17h10"></path><circle cx="16" cy="7" r="2.3"></circle><circle cx="8" cy="17" r="2.3"></circle></svg>',
  search:'<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#A39E97" stroke-width="2" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);"><circle cx="11" cy="11" r="7"></circle><path d="M21 21l-4-4" stroke-linecap="round"></path></svg>',
  check:'<svg width="16" height="16" viewBox="0 0 16 16" fill="none" style="flex-shrink:0;"><path d="M3 8.5 L6.5 12 L13 4" stroke="#1D9E75" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>',
  bookmarkOn:'<svg width="15" height="15" viewBox="0 0 24 24" fill="#0F6E56" stroke="#0F6E56" stroke-width="1.8" stroke-linejoin="round"><path d="M6 4h12v16l-6-4-6 4z"></path></svg>',
  bookmarkOff:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#97918A" stroke-width="1.8" stroke-linejoin="round"><path d="M6 4h12v16l-6-4-6 4z"></path></svg>',
  lock:'<svg width="14" height="14" viewBox="0 0 24 24" fill="none"><rect x="5" y="11" width="14" height="9" rx="2" stroke="#97918A" stroke-width="2"></rect><path d="M8 11 V8 a4 4 0 0 1 8 0 V11" stroke="#97918A" stroke-width="2"></path></svg>',
  shield:'<svg width="16" height="16" viewBox="0 0 24 24" fill="none"><path d="M12 3 L20 6 V11 C20 16 16 20 12 21 C8 20 4 16 4 11 V6 Z" stroke="#0F6E56" stroke-width="2" stroke-linejoin="round"></path><path d="M9 12 L11.5 14.5 L15.5 9.5" stroke="#0F6E56" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></path></svg>',
};
const SPINNER = (b) => `<span style="width:${b||12}px;height:${b||12}px;border:2px solid #BBD8CC;border-top-color:#0F6E56;border-radius:50%;display:inline-block;animation:spin 0.8s linear infinite;"></span>`;

/* ============================== AUTH / ONBOARDING ============================== */
function renderAuth() {
  return `<div class="page">
    <div class="card" style="width:400px; padding:38px 36px; box-shadow:0 2px 10px rgba(0,0,0,.04); border-radius:20px;">
      <div class="brand" style="padding:0; margin-bottom:26px;">${bird(26)}<span style="font-size:20px;">EarlyBirds</span></div>
      <div style="font-weight:700; font-size:23px; letter-spacing:-0.01em;">Catch the worm first.</div>
      <div style="font-size:14.5px; color:var(--muted); margin-top:8px; line-height:1.5;">Sign in and let the agent register you for the events that fit — before the deadlines pass.</div>
      <label class="label" style="margin:24px 0 7px;">Email</label>
      <input class="input" type="text" value="maya.chen@berkeley.edu">
      <button class="btn btn-primary" style="width:100%; margin-top:14px; padding:13px;" onclick="App.go('onboard')">Continue with email</button>
      <div style="display:flex; align-items:center; gap:12px; margin:22px 0; color:var(--placeholder); font-size:12.5px;"><div style="flex:1; height:1px; background:#EDE9E3;"></div>or<div style="flex:1; height:1px; background:#EDE9E3;"></div></div>
      <div style="display:flex; flex-direction:column; gap:10px;">

function renderRegistrations() {
  const actionFor = (row) => ({
    awaiting:{label:'Review',primary:true,step:'awaiting'},
    needsinput:{label:'Answer',primary:true,step:'needsinput'},
    failed:{label:'Retry',primary:true,step:'failed'},
    paused:{label:'Resume',primary:true,step:'captcha'},
    filling:{label:'View',primary:false,step:'filling'},
    registered:{label:'View',primary:false,step:null},
  }[row.status]);
  let rows = REGS_RAW;
  if (state.regFilter==='active') rows = rows.filter(r=>['filling','awaiting','needsinput'].includes(r.status));
  if (state.regFilter==='registered') rows = rows.filter(r=>r.status==='registered');
  if (state.regFilter==='needsyou') rows = rows.filter(r=>['awaiting','needsinput','failed','paused'].includes(r.status));
  const tab = (f,label) => `<button onclick="App.setRegFilter('${f}')" style="padding:8px 4px; border:none; border-bottom:2px solid ${state.regFilter===f?'var(--teal-fill)':'transparent'}; background:none; color:${state.regFilter===f?'var(--text)':'var(--faint)'}; font-size:14px; font-weight:${state.regFilter===f?'600':'500'}; cursor:pointer;">${label}</button>`;
  const rowHtml = (r) => {
    const m = REG_META[r.status]; const a = actionFor(r);
    const act = a.step
      ? `<button onclick="App.openAutofillAt('${r.id}','${a.step}')" class="btn ${a.primary?'btn-primary':'btn-neutral'} btn-sm" ${a.primary?'style="padding:7px 16px;"':''}>${a.label}</button>`
      : `<button class="btn btn-neutral btn-sm">${a.label}</button>`;
    return `<div class="card" style="border-radius:14px; padding:16px 20px; display:flex; align-items:center; gap:16px;">
      <div style="flex:1; min-width:0;"><div style="font-weight:600; font-size:16px;">${r.title}</div><div style="font-size:13px; color:var(--faint); margin-top:3px;">${r.place}</div></div>
      <div class="mono" style="font-size:12.5px; color:var(--faint); width:90px; text-align:right;">${r.deadline}</div>
      <div style="width:170px;"><span style="display:inline-flex; align-items:center; gap:6px; padding:4px 11px; border-radius:999px; font-size:12.5px; font-weight:600; background:${m.bg}; color:${m.color};"><span style="width:6px; height:6px; border-radius:50%; background:${m.dot};"></span>${m.label}</span></div>
      ${act}
    </div>`;
  };
  return renderApp(`<div class="wrap">
    <h1 class="page-title">Registrations</h1>
    <div class="page-sub">Everything the agent is working on, and what still needs you.</div>
    <div style="display:flex; gap:22px; margin-top:20px; border-bottom:1px solid var(--border);">${tab('all','All')}${tab('active','Active')}${tab('needsyou','Needs you')}${tab('registered','Registered')}</div>

        <div style="font-weight:700; font-size:20px; letter-spacing:-0.01em; margin-top:16px;">Couldn't submit — site rejected it.</div>
        <div style="font-size:14px; color:var(--muted); margin-top:8px; line-height:1.5;">${sel.title}'s form returned an error on submit. Your answers are saved — nothing was lost.</div>
        <div class="mono" style="font-size:12px; color:var(--red-text); background:var(--red-bg); border-radius:9px; padding:10px 12px; margin-top:16px; line-height:1.5;">ERR 422 · field "phone" required but not in profile</div>
        <div style="display:flex; gap:10px; margin-top:20px;"><button class="btn btn-neutral" style="flex:1; padding:12px; justify-content:center;" onclick="App.go('registrations')">Back to registrations</button><button class="btn btn-primary" style="flex:1; padding:12px;" onclick="App.retry()">Retry</button></div>
      </div>
    </div>`;
  }

  return `<div style="height:100vh; background:var(--bg); display:flex; flex-direction:column; position:relative;">
    <div style="background:#fff; border-bottom:1px solid var(--border-lt2); padding:16px 28px; display:flex; align-items:center; justify-content:space-between;">
      <div style="display:flex; align-items:center; gap:11px;">${bird(22)}<span style="font-weight:700; font-size:16px;">EarlyBirds</span>${afStatusPill(af)}</div>
      <button class="btn-ghost" onclick="App.go('feed')">✕ Close</button>
    </div>
    ${body}
    ${demo}
  </div>`;
}

/* ============================== ROOT RENDER ============================== */
function render() {
  const r = state.route;
  let html;
  if (r==='auth') html = renderAuth();
  else if (r==='onboard') html = renderOnboard();
  else if (r==='basics') html = renderBasics();
  else if (r==='voice') html = renderVoice();
  else if (r==='autofill') html = renderAutofill();
  else if (r==='feed') html = renderFeed();
  else if (r==='saved') html = renderSaved();
  else if (r==='event') html = renderEvent();
  else if (r==='registrations') html = renderRegistrations();
  else if (r==='notifications') html = renderNotifications();
  else if (r==='profile') html = renderProfile();
  else if (r==='settings') html = renderSettings();
  else html = renderFeed();
  document.getElementById('app').innerHTML = html;
}
render();
</script>
</body>
</html>
