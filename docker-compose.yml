services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: earlybirds
      POSTGRES_PASSWORD: earlybirds
      POSTGRES_DB: earlybirds
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U earlybirds"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: earlybirds
      MINIO_ROOT_PASSWORD: earlybirds
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO console
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Creates the artifacts bucket on first start.
  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 earlybirds earlybirds;
        mc mb --ignore-existing local/earlybirds-artifacts;
        mc anonymous set public local/earlybirds-artifacts;
        echo 'MinIO bucket ready.';
      "
    restart: "no"

volumes:
  postgres_data:
  redis_data:
  minio_data:
